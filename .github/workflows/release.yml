name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd plugins/wiki/mcp && npm ci

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          node -e "
            const fs = require('fs');
            const files = [
              'plugins/wiki/.claude-plugin/plugin.json',
              'plugins/wiki/mcp/package.json'
            ];
            files.forEach(f => {
              const d = JSON.parse(fs.readFileSync(f, 'utf8'));
              d.version = '$VERSION';
              fs.writeFileSync(f, JSON.stringify(d, null, 2) + '\n');
            });
            console.log('Version set to $VERSION');
          "

      - name: Build bundle
        run: cd plugins/wiki/mcp && npm run build

      - name: Commit bundle and version files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/wiki/mcp/bundle.js plugins/wiki/.claude-plugin/plugin.json plugins/wiki/mcp/package.json
          git commit -m "chore: build bundle and set version ${GITHUB_REF_NAME#v} [skip ci]" || echo "Nothing to commit"
          git push origin HEAD:main

      - name: Create GitHub Release
        run: |
          gh release create $GITHUB_REF_NAME \
            --title "Release $GITHUB_REF_NAME" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
